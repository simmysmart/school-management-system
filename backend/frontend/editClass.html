<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Edit Class</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

    <h2>Edit Class</h2>

    <form id="editClassForm">

        <label>Class Name</label>

        <input
            type="text"
            id="class_name"
            required
        >

        <label>Class Teacher</label>

        <select id="class_teacher">

            <option value="">Loading teachers...</option>

        </select>

        <button type="submit">

            Update Class

        </button>

    </form>

    <p id="message"></p>

</div>

<script src="editClass.js"></script>

</body>

</html>
