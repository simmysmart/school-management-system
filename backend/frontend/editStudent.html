<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="dashboard">

    <div class="sidebar">
        <h2></h2>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="students.html">Students</a></li>
            <li><a href="addStudent.html">Add Student</a></li>
        </ul>
    </div>

    <div class="main">

        <h1>Edit Student</h1>

        <form id="editForm">

            <input type="text" id="admission_number" placeholder="Admission Number" required>

            <input type="text" id="first_name" placeholder="First Name" required>

            <input type="text" id="last_name" placeholder="Last Name" required>

            <select id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>

            <input type="date" id="date_of_birth" required>

            <input type="text" id="student_class" placeholder="Class" required>

            <input type="text" id="phone" placeholder="Phone">

            <input type="email" id="email" placeholder="Email">

            <textarea id="address" placeholder="Address"></textarea>

            <button type="submit">Update Student</button>

        </form>

        <p id="message"></p>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/auth.js"></script>
<script src="js/logout.js"></script>

<!-- Page specific JS -->
<script src="js/editStudent.js"></script>

</body>
</html>
