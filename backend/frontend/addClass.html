<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Class</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <img src="images/logo.jpg" alt="School Logo" class="sidebar-school-logo">

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="students.html"> Students</a></li>

            <li><a href="addStudent.html">Add Student</a></li>

            <li><a href="teachers.html">Teachers</a></li>

            <li><a href="addTeacher.html">Add Teacher</a></li>

            <li><a href="classes.html">Classes</a></li>
            <li><a href="payments.html">Payments</a></li>

            li><a href="addPayment.html">Add Payment</a></li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <div class="topbar">

            <h1>Add Class</h1>

        </div>

        <div class="form-container">

            <form id="classForm">

                <div class="form-group">

                    <label>Class Name</label>

                    <input
                        type="text"
                        id="class_name"
                        placeholder="Enter class name"
                        required>

                </div>

                <div class="form-group">

                    <label>Class Teacher</label>

                    <select id="class_teacher" required>

                        <option value="">
                            Loading Teachers...
                        </option>

                    </select>

                </div>

                <div id="message"></div>

                <button
                    type="submit"
                    class="btn">

                    Save Class

                </button>

            </form>

        </div>

    </div>

</div>

<script src="addClass.js"></script>

</body>

</html>
