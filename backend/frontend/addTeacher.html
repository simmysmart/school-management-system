    <div class="main">

        <h1>Add Teacher</h1>

        <form id="teacherForm" class="student-form">

    <input
        type="text"
        id="staff_id"
        placeholder="Staff ID"
        required
    >

    <input
        type="text"
        id="first_name"
        placeholder="First Name"
        required
    >

    <input
        type="text"
        id="last_name"
        placeholder="Last Name"
        required
    >

    <select id="gender" required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
    </select>

    <input
        type="text"
        id="phone"
        placeholder="Phone Number"
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <textarea
        id="address"
        placeholder="Address"
    ></textarea>

    <input
        type="text"
        id="qualification"
        placeholder="Qualification"
    >

    <button type="submit">
        Save Teacher
    </button>

</form>

<div id="message"></div>

        <p id="message"></p>

    </div>
