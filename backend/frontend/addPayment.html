<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Payment</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <img src="images/logo.jpg" class="sidebar-school-logo">

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="students.html">Students</a></li>

            <li><a href="teachers.html">Teachers</a></li>

            <li><a href="classes.html">Classes</a></li>

            <li><a href="subjects.html">Subjects</a></li>

            <li><a href="fees.html">Fees</a></li>

            <li><a href="payments.html">Payments</a></li>

            <li><a href="addPayment.html" class="active">Add Payment</a></li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="topbar">

            <h1>Add Payment</h1>

        </div>

        <div class="form-card">

            <form id="paymentForm">

                <div class="form-group">

                    <label>Student</label>

                    <select id="student_id" required>

                        <option value="">Loading Students...</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Fee</label>

                    <select id="fee_id" required>

                        <option value="">Loading Fees...</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Amount Paid</label>

                    <input
                        type="number"
                        id="amount_paid"
                        required>

                </div>

                <div class="form-group">

                    <label>Payment Method</label>

                    <select id="payment_method" required>

                        <option value="">Select Method</option>

                        <option value="Cash">Cash</option>

                        <option value="Transfer">Transfer</option>

                        <option value="POS">POS</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Payment Date</label>

                    <input
                        type="date"
                        id="payment_date"
                        required>

                </div>

                <button type="submit" class="btn">

                    Save Payment

                </button>

            </form>

        </div>

    </div>

</div>

<script src="addPayment.js"></script>

</body>

</html>
