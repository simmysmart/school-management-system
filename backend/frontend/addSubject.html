<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Subject</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <img src="images/logo.jpg" alt="School Logo" class="sidebar-school-logo">

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="students.html">Students</a></li>

            <li><a href="addStudent.html">Add Student</a></li>

            <li><a href="teachers.html">Teachers</a></li>

            <li><a href="addTeacher.html">Add Teacher</a></li>

            <li><a href="classes.html">Classes</a></li>

            <li><a href="addClass.html">Add Class</a></li>

            <li><a href="subjects.html">Subjects</a></li>

            <li><a href="addSubject.html" class="active">Add Subject</a></li>

        </ul>

    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="topbar">

            <h1>Add Subject</h1>

        </div>

        <div class="form-card">

            <form id="subjectForm">

                <div class="form-group">

                    <label>Subject Name</label>

                    <input
                        type="text"
                        id="subject_name"
                        placeholder="Enter Subject Name"
                        required>

                </div>

                <div class="form-group">

                    <label>Subject Code</label>

                    <input
                        type="text"
                        id="subject_code"
                        placeholder="Example: MTH101"
                        required>

                </div>

                <div class="form-group">

                    <label>Class</label>

                    <select id="class_id" required>

                        <option value="">Loading Classes...</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Teacher</label>

                    <select id="teacher_id">

                        <option value="">Loading Teachers...</option>

                    </select>

                </div>

                <button type="submit" class="btn">

                    Save Subject

                </button>

            </form>

        </div>

    </div>

</div>

<script>

const API = "http://localhost:5000/api";

// ===============================
// Load Classes
// ===============================

async function loadClasses() {

    const select = document.getElementById("class_id");

    try {

        const res = await fetch(API + "/classes");

        const result = await res.json();

        console.log("Class API Response:", result);

        let html = '<option value="">Select Class</option>';

        if (result.success && Array.isArray(result.data)) {

            result.data.forEach(c => {

                html += `
                    <option value="${c.id}">
                        ${c.class_name}
                    </option>
                `;

            });

        } else {

            html = '<option value="">No Classes Found</option>';

        }

        select.innerHTML = html;

    }

    catch (err) {

        console.error(err);

        select.innerHTML = '<option value="">Unable to load classes</option>';

    }

}
// ===============================
// Load Teachers
// ===============================

async function loadTeachers() {

    const select = document.getElementById("teacher_id");

    try {

        const res = await fetch(API + "/teachers");

        const result = await res.json();

        console.log("Teacher API Response:", result);

        let html = '<option value="">Select Teacher</option>';

        if (result.success && Array.isArray(result.teachers)) {

            result.teachers.forEach(t => {

                html += `
                    <option value="${t.id}">
                        ${t.first_name} ${t.last_name}
                    </option>
                `;

            });

        } else {

            html = '<option value="">No Teachers Found</option>';

        }

        select.innerHTML = html;

    }

    catch (err) {

        console.error(err);

        select.innerHTML = '<option value="">Unable to load teachers</option>';

    }

}
// ===============================
// Save Subject
// ===============================

document.getElementById("subjectForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        subject_name: document.getElementById("subject_name").value,

        subject_code: document.getElementById("subject_code").value,

        class_id: document.getElementById("class_id").value,

        teacher_id: document.getElementById("teacher_id").value || null

    };

    try{

        const res = await fetch(API + "/subjects",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(data)

        });

        const result = await res.json();

        if(result.success){

            alert("Subject added successfully!");

            window.location.href = "subjects.html";

        }else{

            alert(result.message);

        }

    }

    catch(err){

        console.log(err);

        alert("Server Error");

    }

});

// Load dropdowns

loadClasses();

loadTeachers();

</script>

</body>

</html>
