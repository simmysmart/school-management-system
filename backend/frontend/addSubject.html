<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Subject</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <img src="images/logo.jpg"
             alt="School Logo"
             class="sidebar-school-logo">

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="students.html">Students</a></li>

            <li><a href="addStudent.html">Add Student</a></li>

            <li><a href="teachers.html">Teachers</a></li>

            <li><a href="addTeacher.html">Add Teacher</a></li>

            <li><a href="classes.html">Classes</a></li>

            <li><a href="addClass.html">Add Class</a></li>

            <li><a href="subjects.html">Subjects</a></li>

            <li><a href="addSubject.html" class="active">Add Subject</a></li>

            <li><a href="attendance.html">Attendance</a></li>

            <li><a href="results.html">Results</a></li>

            <li><a href="fees.html">Fees</a></li>

            <li><a href="payments.html">Payments</a></li>

            <li><a href="reportCards.html">Report Cards</a></li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="topbar">

            <h1>Add Subject</h1>

            <button
                id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

        <div class="form-card">

            <form id="subjectForm">

                <div class="form-group">

                    <label>Subject Name</label>

                    <input
                        type="text"
                        id="subject_name"
                        required>

                </div>

                <div class="form-group">

                    <label>Subject Code</label>

                    <input
                        type="text"
                        id="subject_code"
                        required>

                </div>

                <div class="form-group">

                    <label>Class</label>

                    <select
                        id="class_id"
                        required>

                        <option value="">
                            Loading Classes...
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Teacher</label>

                    <select
                        id="teacher_id">

                        <option value="">
                            Loading Teachers...
                        </option>

                    </select>

                </div>

                <button
                    type="submit"
                    class="btn">

                    Save Subject

                </button>

            </form>

            <div id="message"></div>

        </div>

    </div>

</div>

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/helpers.js"></script>

<script src="js/auth.js"></script>

<script src="js/logout.js"></script>

<script src="js/addSubject.js"></script>

</body>

</html>
