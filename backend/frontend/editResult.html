<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Result</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <img src="images/logo.jpg" class="sidebar-school-logo">

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="students.html">Students</a></li>

            <li><a href="teachers.html">Teachers</a></li>

            <li><a href="classes.html">Classes</a></li>

            <li><a href="subjects.html">Subjects</a></li>

            <li><a href="fees.html">Fees</a></li>

            <li><a href="payments.html">Payments</a></li>

            <li><a href="results.html" class="active">Results</a></li>

        </ul>

    </div>
     <button
    class="logout-btn"
    onclick="logout()">

    Logout

</button>

    <!-- Main -->

    <div class="main">

        <div class="topbar">

            <h1>Edit Result</h1>

        </div>

        <div class="form-card">

            <form id="resultForm">

                <div class="form-group">

                    <label>Student</label>

                    <select id="student_id" required></select>

                </div>

                <div class="form-group">

                    <label>Subject</label>

                    <select id="subject_id" required></select>

                </div>

                <div class="form-group">

                    <label>Term</label>

                    <select id="term" required>

                        <option value="First">First Term</option>

                        <option value="Second">Second Term</option>

                        <option value="Third">Third Term</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Session</label>

                    <input
                        type="text"
                        id="session"
                        required>

                </div>

                <div class="form-group">

                    <label>CA Score</label>

                    <input
                        type="number"
                        id="ca_score"
                        min="0"
                        max="30"
                        required>

                </div>

                <div class="form-group">

                    <label>Exam Score</label>

                    <input
                        type="number"
                        id="exam_score"
                        min="0"
                        max="70"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn">

                    Update Result

                </button>

            </form>

        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/auth.js"></script>
<script src="js/editResult.js"></script>

</body>

</html>
