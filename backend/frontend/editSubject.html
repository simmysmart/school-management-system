<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Subject</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <img src="images/logo.jpg" alt="School Logo" class="sidebar-school-logo">

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="students.html">Students</a></li>

            <li><a href="addStudent.html">Add Student</a></li>

            <li><a href="teachers.html">Teachers</a></li>

            <li><a href="addTeacher.html">Add Teacher</a></li>

            <li><a href="classes.html">Classes</a></li>

            <li><a href="addClass.html">Add Class</a></li>

            <li><a href="subjects.html" class="active">Subjects</a></li>

            <li><a href="addSubject.html">Add Subject</a></li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <div class="topbar">

            <h1>Edit Subject</h1>

        </div>

        <div class="form-card">

            <form id="editSubjectForm">

                <div class="form-group">

                    <label>Subject Name</label>

                    <input
                        type="text"
                        id="subject_name"
                        required>

                </div>

                <div class="form-group">

                    <label>Subject Code</label>

                    <input
                        type="text"
                        id="subject_code"
                        required>

                </div>

                <div class="form-group">

                    <label>Class</label>

                    <select id="class_id" required>

                        <option>Loading...</option>

                    </select>

                </div>

                <div class="form-group">

                    <label>Teacher</label>

                    <select id="teacher_id">

                        <option>Loading...</option>

                    </select>

                </div>

                <button type="submit" class="btn">

                    Update Subject

                </button>

            </form>

        </div>

    </div>

</div>

<script>

const API = "http://localhost:5000/api";

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

// ==========================
// Load Classes
// ==========================

async function loadClasses(selected = ""){

    const res = await fetch(API + "/classes");

    const result = await res.json();

    let html = '<option value="">Select Class</option>';

    const classes = result.data || result.classes || [];

    classes.forEach(c=>{

        html += `
            <option value="${c.id}"
            ${selected == c.id ? "selected":""}>
            ${c.class_name}
            </option>
        `;

    });

    document.getElementById("class_id").innerHTML = html;

}

// ==========================
// Load Teachers
// ==========================

async function loadTeachers(selected=""){

    const res = await fetch(API + "/teachers");

    const result = await res.json();

    let html='<option value="">Select Teacher</option>';

    const teachers = result.data || result.teachers || [];

    teachers.forEach(t=>{

        html+=`
        <option value="${t.id}"
        ${selected==t.id?"selected":""}>
        ${t.first_name} ${t.last_name}
        </option>
        `;

    });

    document.getElementById("teacher_id").innerHTML=html;

}

// ==========================
// Load Subject
// ==========================

async function loadSubject(){

    const res = await fetch(API + "/subjects/" + id);

    const result = await res.json();

    const subject = result.data;

    document.getElementById("subject_name").value = subject.subject_name;

    document.getElementById("subject_code").value = subject.subject_code;

    await loadClasses(subject.class_id);

    await loadTeachers(subject.teacher_id);

}

// ==========================
// Update
// ==========================

document.getElementById("editSubjectForm").addEventListener("submit",async(e)=>{

    e.preventDefault();

    const data={

        subject_name:document.getElementById("subject_name").value,

        subject_code:document.getElementById("subject_code").value,

        class_id:document.getElementById("class_id").value,

        teacher_id:document.getElementById("teacher_id").value

    };

    const res = await fetch(API+"/subjects/"+id,{

        method:"PUT",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify(data)

    });

    const result = await res.json();

    alert(result.message);

    if(result.success){

        window.location.href="subjects.html";

    }

});

loadSubject();

</script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/helpers.js"></script>
<script src="js/auth.js"></script>
<script src="js/logout.js"></script>

<!-- Page specific JS -->
<script src="js/dashboard.js"></script>

</body>

</html>
